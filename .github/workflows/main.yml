name: Build MacroHub Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip -q gradle-8.8-bin.zip
          sudo mv gradle-8.8 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Generate wrapper
        run: gradle wrapper

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: macrohub-mod-jar
          path: build/libs/macrohub-*.jar
